inherit_from: .rubocop_todo.yml

inherit_gem:
  main_branch_shared_rubocop_config: config/rubocop.yml

inherit_mode:
  merge:
    - Exclude

# lib/git.rb is the gem's main entry-point module and is expected to be long
Metrics/ModuleLength:
  Exclude:
    - "lib/git.rb"

# gemspec and command DSL blocks are intentionally long
Metrics/BlockLength:
  Exclude:
    - "*.gemspec"
    - "lib/git/commands/**/*.rb"

# Allow gemspec to have long lines
Layout/LineLength:
  Exclude:
    - "*.gemspec"

Style/OneClassPerFile:
  Enabled: false

AllCops:
  # Pin this project to Ruby 3.1 in case the shared config above is upgraded to 3.2
  # or later.
  TargetRubyVersion: 3.2
